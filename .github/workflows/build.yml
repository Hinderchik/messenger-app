name: Build Messenger

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - 'windows/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      windows: ${{ steps.filter.outputs.windows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - '.github/workflows/build.yml'
            windows:
              - 'windows/**'
              - '.github/workflows/build.yml'

  build-android:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Create gradle wrapper
        run: |
          cd android
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew 2>/dev/null || true
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-android
          path: android/app/build/outputs/apk/release/*.apk

  build-windows:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.windows == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Download websocketpp
        run: |
          mkdir deps
          cd deps
          curl -L https://github.com/zaphoyd/websocketpp/archive/refs/tags/0.8.2.tar.gz -o websocketpp.tar.gz
          tar -xzf websocketpp.tar.gz
          curl -L https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp -o json.hpp
          
      - name: Build EXE
        run: |
          cd windows
          mkdir build
          cd build
          cl /EHsc /I..\..\deps\websocketpp-0.8.2 /I..\..\deps /Fe:messenger.exe ..\src\main.cpp /link ws2_32.lib crypt32.lib user32.lib gdi32.lib comctl32.lib
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: messenger-windows
          path: windows/build/messenger.exe