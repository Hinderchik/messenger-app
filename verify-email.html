<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение email - c.c Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h2 { margin-bottom: 16px; color: #333; }
        p { color: #666; margin-bottom: 24px; line-height: 1.5; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card" id="content">
        <div class="icon">✉️</div>
        <h2>Подтверждение email</h2>
        <p>Пожалуйста, подождите...</p>
        <div class="loader"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        
        async function verify() {
            if (!token) {
                document.getElementById('content').innerHTML = `
                    <div class="icon">❌</div>
                    <h2>Неверная ссылка</h2>
                    <p>Токен подтверждения отсутствует</p>
                    <a href="/login.html" class="btn">Вернуться ко входу</a>
                `;
                return;
            }
            
            try {
                const res = await fetch(`/api/verify-email?token=${token}`);
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('content').innerHTML = `
                        <div class="icon">✅</div>
                        <h2>Email подтверждён!</h2>
                        <p>${data.message || 'Теперь вы можете войти в аккаунт.'}</p>
                        <a href="/login.html" class="btn">Перейти ко входу</a>
                    `;
                } else {
                    document.getElementById('content').innerHTML = `
                        <div class="icon">❌</div>
                        <h2>Ошибка</h2>
                        <p>${data.error || 'Не удалось подтвердить email'}</p>
                        <a href="/login.html" class="btn">Вернуться ко входу</a>
                    `;
                }
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="icon">❌</div>
                    <h2>Ошибка</h2>
                    <p>Не удалось подключиться к серверу</p>
                    <a href="/login.html" class="btn">Вернуться ко входу</a>
                `;
            }
        }
        
        verify();
    </script>
</body>
</html>
