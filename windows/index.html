<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; height: 100vh; overflow: hidden; }
        .app { display: flex; height: 100vh; background: #1a1a1a; }
        .sidebar { width: 320px; background: #2d2d2d; border-right: 1px solid #404040; display: flex; flex-direction: column; }
        .user-info { padding: 20px; background: #252525; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #404040; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #667eea; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: white; }
        .username { font-size: 18px; font-weight: bold; color: white; }
        .status { font-size: 12px; color: #4ade80; }
        .search { padding: 15px; background: #252525; }
        .search input { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #3d3d3d; color: white; outline: none; }
        .users-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #404040; transition: background 0.2s; }
        .user-item:hover { background: #3d3d3d; }
        .user-item.active { background: #667eea; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: #667eea; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .user-info-text { flex: 1; }
        .user-name { color: white; font-weight: 600; }
        .user-status { font-size: 11px; color: #888; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #4ade80; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #1a1a1a; }
        .chat-header { padding: 20px; background: #2d2d2d; border-bottom: 1px solid #404040; display: flex; align-items: center; gap: 15px; }
        .chat-avatar { width: 45px; height: 45px; border-radius: 50%; background: #667eea; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .chat-name { font-size: 18px; font-weight: bold; color: white; }
        .chat-status { font-size: 12px; color: #888; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 60%; padding: 10px 15px; border-radius: 15px; }
        .message.sent { align-self: flex-end; background: #667eea; color: white; }
        .message.received { align-self: flex-start; background: #2d2d2d; color: white; }
        .message-time { font-size: 10px; opacity: 0.7; margin-top: 5px; }
        .input-area { padding: 20px; background: #2d2d2d; border-top: 1px solid #404040; display: flex; gap: 10px; }
        .message-input { flex: 1; padding: 12px; border: none; border-radius: 25px; background: #3d3d3d; color: white; outline: none; }
        .send-button { padding: 10px 25px; background: #667eea; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .auth-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-box { background: #1a1a1a; padding: 40px; border-radius: 20px; width: 400px; }
        .auth-box h2 { color: white; margin-bottom: 30px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #404040; border-radius: 8px; background: #2d2d2d; color: white; }
        .auth-button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .auth-switch { text-align: center; margin-top: 20px; color: #667eea; cursor: pointer; }
        .error { color: #ef4444; font-size: 12px; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://igneocxwtgnjuklerizs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_2QdRrPXwYOZs-lQASDrDfw_MLsZHMc-';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = null;
        let currentChat = null;
        let messages = [];
        let users = [];
        
        async function checkAuth() {
            const session = localStorage.getItem('session');
            if (session) {
                const { data: user } = await supabase.from('users').select('*').eq('session', session).single();
                if (user) {
                    currentUser = user;
                    initApp();
                    return;
                }
            }
            showAuth();
        }
        
        async function showAuth() {
            document.getElementById('app').innerHTML = `
                <div class="auth-container">
                    <div class="auth-box">
                        <h2 id="auth-title">Вход</h2>
                        <div id="auth-error" class="error"></div>
                        <input type="text" id="auth-username" placeholder="Имя пользователя" class="auth-input">
                        <input type="password" id="auth-password" placeholder="Пароль" class="auth-input">
                        <button id="auth-submit" class="auth-button">Войти</button>
                        <div id="auth-switch" class="auth-switch">Нет аккаунта? Зарегистрироваться</div>
                    </div>
                </div>
            `;
            
            let isLogin = true;
            
            document.getElementById('auth-submit').onclick = async () => {
                const username = document.getElementById('auth-username').value;
                const password = document.getElementById('auth-password').value;
                const errorDiv = document.getElementById('auth-error');
                
                if (!username || !password) {
                    errorDiv.textContent = 'Заполните все поля';
                    return;
                }
                
                if (isLogin) {
                    const { data: user } = await supabase.from('users').select('*').eq('username', username).single();
                    if (!user) {
                        errorDiv.textContent = 'Пользователь не найден';
                        return;
                    }
                    
                    const hash = await sha256(password + user.salt);
                    if (hash !== user.password) {
                        errorDiv.textContent = 'Неверный пароль';
                        return;
                    }
                    
                    const session = Math.random().toString(36) + Date.now();
                    await supabase.from('users').update({ session, online: 1 }).eq('id', user.id);
                    localStorage.setItem('session', session);
                    currentUser = { ...user, session };
                    initApp();
                } else {
                    const salt = Math.random().toString(36);
                    const hash = await sha256(password + salt);
                    const { data: user, error } = await supabase.from('users').insert({
                        username,
                        password: hash,
                        salt,
                        session: Math.random().toString(36) + Date.now(),
                        online: 1
                    }).select().single();
                    
                    if (error) {
                        errorDiv.textContent = 'Имя занято';
                        return;
                    }
                    
                    localStorage.setItem('session', user.session);
                    currentUser = user;
                    initApp();
                }
            };
            
            document.getElementById('auth-switch').onclick = () => {
                isLogin = !isLogin;
                const title = document.getElementById('auth-title');
                const switchBtn = document.getElementById('auth-switch');
                if (isLogin) {
                    title.textContent = 'Вход';
                    switchBtn.textContent = 'Нет аккаунта? Зарегистрироваться';
                } else {
                    title.textContent = 'Регистрация';
                    switchBtn.textContent = 'Уже есть аккаунт? Войти';
                }
            };
        }
        
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        async function initApp() {
            await loadUsers();
            await setupRealtime();
            renderApp();
        }
        
        async function loadUsers() {
            const { data } = await supabase.from('users').select('id, username, online').neq('id', currentUser.id);
            users = data || [];
        }
        
        async function setupRealtime() {
            supabase.channel('messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const msg = payload.new;
                    if (msg.to_id === currentUser.id || msg.from_id === currentUser.id) {
                        if (currentChat && (msg.from_id === currentChat.id || msg.to_id === currentChat.id)) {
                            messages.push(msg);
                            renderMessages();
                        }
                        if (msg.from_id !== currentUser.id) {
                            playNotification();
                        }
                    }
                })
                .subscribe();
            
            supabase.channel('users')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users' }, payload => {
                    const user = payload.new;
                    const userInList = users.find(u => u.id === user.id);
                    if (userInList) userInList.online = user.online;
                    if (currentChat && currentChat.id === user.id) {
                        document.getElementById('chat-status').textContent = user.online ? 'онлайн' : 'офлайн';
                    }
                    renderUsersList();
                })
                .subscribe();
        }
        
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentChat) return;
            
            await supabase.from('messages').insert({
                from_id: currentUser.id,
                to_id: currentChat.id,
                text,
                time: Date.now()
            });
            
            input.value = '';
        }
        
        function renderApp() {
            document.getElementById('app').innerHTML = `
                <div class="app">
                    <div class="sidebar">
                        <div class="user-info">
                            <div class="avatar">${currentUser.username[0].toUpperCase()}</div>
                            <div>
                                <div class="username">${currentUser.username}</div>
                                <div class="status">онлайн</div>
                            </div>
                        </div>
                        <div class="search">
                            <input type="text" id="search-users" placeholder="Поиск...">
                        </div>
                        <div class="users-list" id="users-list"></div>
                    </div>
                    <div class="chat-area">
                        ${currentChat ? `
                            <div class="chat-header">
                                <div class="chat-avatar">${currentChat.username[0].toUpperCase()}</div>
                                <div>
                                    <div class="chat-name">${currentChat.username}</div>
                                    <div class="chat-status" id="chat-status">${currentChat.online ? 'онлайн' : 'офлайн'}</div>
                                </div>
                            </div>
                            <div class="messages" id="messages"></div>
                            <div class="input-area">
                                <input type="text" id="message-input" class="message-input" placeholder="Сообщение...">
                                <button id="send-button" class="send-button">Отправить</button>
                            </div>
                        ` : `
                            <div style="flex:1; display:flex; align-items:center; justify-content:center; color:#888">
                                Выберите чат
                            </div>
                        `}
                    </div>
                </div>
            `;
            
            if (currentChat) {
                loadMessages();
                document.getElementById('send-button').onclick = sendMessage;
                document.getElementById('message-input').onkeypress = (e) => {
                    if (e.key === 'Enter') sendMessage();
                };
            }
            
            renderUsersList();
            
            const searchInput = document.getElementById('search-users');
            if (searchInput) {
                searchInput.oninput = (e) => renderUsersList(e.target.value);
            }
        }
        
        async function loadMessages() {
            const { data } = await supabase
                .from('messages')
                .select('*')
                .or(`from_id.eq.${currentUser.id},to_id.eq.${currentUser.id}`)
                .or(`from_id.eq.${currentChat.id},to_id.eq.${currentChat.id}`)
                .order('time', { ascending: true });
            
            messages = data || [];
            renderMessages();
        }
        
        function renderMessages() {
            const container = document.getElementById('messages');
            if (!container) return;
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.from_id === currentUser.id ? 'sent' : 'received'}">
                    <div>${escapeHtml(msg.text)}</div>
                    <div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }
        
        function renderUsersList(filter = '') {
            const container = document.getElementById('users-list');
            if (!container) return;
            
            const filtered = users.filter(u => u.username.toLowerCase().includes(filter.toLowerCase()));
            
            container.innerHTML = filtered.map(user => `
                <div class="user-item ${currentChat?.id === user.id ? 'active' : ''}" onclick="selectUser(${user.id})">
                    <div class="user-avatar">${user.username[0].toUpperCase()}</div>
                    <div class="user-info-text">
                        <div class="user-name">${escapeHtml(user.username)}</div>
                        <div class="user-status">${user.online ? 'онлайн' : 'офлайн'}</div>
                    </div>
                    <div class="status-dot" style="background: ${user.online ? '#4ade80' : '#6b7280'}"></div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function playNotification() {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('Новое сообщение');
            }
        }
        
        window.selectUser = async (userId) => {
            currentChat = users.find(u => u.id === userId);
            renderApp();
        };
        
        if ('Notification' in window) {
            Notification.requestPermission();
        }
        
        checkAuth();
    </script>
</body>
</html>
