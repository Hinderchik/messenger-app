name: Build Messenger

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Create gradle wrapper
        run: |
          cd android
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "#!/bin/sh" > gradlew
          echo "exec java -cp \"gradle/wrapper/gradle-wrapper.jar\" org.gradle.wrapper.GradleWrapperMain \"\$@\"" >> gradlew
          chmod +x gradlew
          
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-android
          path: android/app/build/outputs/apk/release/*.apk

  build-windows:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.windows == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Download websocketpp
        run: |
          mkdir deps
          cd deps
          curl -L https://github.com/zaphoyd/websocketpp/archive/refs/tags/0.8.2.tar.gz -o websocketpp.tar.gz
          tar -xzf websocketpp.tar.gz
          curl -L https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp -o json.hpp
          
      - name: Build EXE
        run: |
          cd windows
          mkdir build
          cd build
          cl /EHsc /I..\..\deps\websocketpp-0.8.2 /I..\..\deps /Fe:messenger.exe ..\src\main.cpp /link ws2_32.lib crypt32.lib user32.lib gdi32.lib comctl32.lib
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: messenger-windows
          path: windows/build/messenger.exe