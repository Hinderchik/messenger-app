name: Build Messenger

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - 'windows/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      windows: ${{ steps.filter.outputs.windows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - '.github/workflows/build.yml'
            windows:
              - 'windows/**'
              - '.github/workflows/build.yml'

  build-android:
    needs: check-changes
    if: needs.check-changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Create gradle wrapper
        run: |
          cd android
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew 2>/dev/null || true
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-android
          path: android/app/build/outputs/apk/release/*.apk

  build-windows:
  needs: check-changes
  if: needs.check-changes.outputs.windows == 'true'
  runs-on: windows-latest
  steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      
    - name: Configure CMake
      run: |
        cd windows
        mkdir build
        cd build
        cmake ..
        
    - name: Build EXE
      run: |
        cd windows/build
        cmake --build . --config Release
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: messenger-windows
        path: windows/build/Release/messenger.exe