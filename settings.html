<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки - c.c Messenger</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
    <div class="settings-container">
        <div class="settings-header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1>Настройки</h1>
        </div>
        <div class="settings-content">
            <div class="settings-section">
                <h3>Внешний вид</h3>
                <div class="setting-item">
                    <span>Тёмная тема</span>
                    <div class="theme-switch" id="themeSwitch"></div>
                </div>
            </div>
            <div class="settings-section">
                <h3>Аккаунт</h3>
                <div class="setting-item">
                    <span>Имя пользователя</span>
                    <span class="setting-value" id="usernameDisplay"></span>
                </div>
                <div class="setting-item">
                    <span>Email</span>
                    <span class="setting-value" id="emailDisplay"></span>
                </div>
                <div class="setting-item">
                    <span>ID пользователя</span>
                    <span class="setting-value" id="userIdDisplay"></span>
                </div>
            </div>
            <div class="settings-section">
                <h3>Конфиденциальность</h3>
                <div class="setting-item">
                    <span>Последняя активность</span>
                    <span class="setting-value">Все пользователи</span>
                </div>
                <div class="setting-item">
                    <span>Фото профиля</span>
                    <span class="setting-value">Все пользователи</span>
                </div>
            </div>
            <div class="settings-section">
                <h3>О приложении</h3>
                <div class="setting-item">
                    <span>Версия</span>
                    <span class="setting-value">1.0.0</span>
                </div>
            </div>
            <button class="logout-btn-full" id="logoutBtnFull">Выйти из аккаунта</button>
        </div>
    </div>
    <style>
        .settings-container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .settings-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--tg-text); }
        .settings-section { margin-bottom: 30px; }
        .settings-section h3 { margin-bottom: 16px; color: var(--tg-text-secondary); font-size: 16px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--tg-divider); }
        .setting-value { color: var(--tg-text-secondary); }
        .logout-btn-full { width: 100%; padding: 14px; background: #ef4444; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .theme-switch { width: 50px; height: 26px; background: var(--tg-bg); border-radius: 13px; position: relative; cursor: pointer; transition: background 0.3s; }
        .theme-switch.active { background: var(--tg-accent); }
        .theme-switch::after { content: ''; width: 22px; height: 22px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.3s; }
        .theme-switch.active::after { transform: translateX(24px); }
    </style>
    <script src="/app.js"></script>
</body>
</html>
