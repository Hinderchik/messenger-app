<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c.c Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 32px; color: #1a1a2e; margin-bottom: 12px; }
        p { color: #666; margin-bottom: 32px; line-height: 1.6; }
        .buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 12px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.5); }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover { background: #e0e0e0; }
        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        .feature { text-align: center; flex: 1; }
        .feature-icon { font-size: 28px; margin-bottom: 8px; }
        .feature-text { font-size: 12px; color: #888; }
        @media (max-width: 480px) {
            .card { padding: 40px 25px; }
            h1 { font-size: 28px; }
            .buttons { gap: 12px; }
            .btn { padding: 10px 24px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💬</div>
        <h1>c.c Messenger</h1>
        <p>Быстрый, безопасный и современный мессенджер</p>
        <div class="buttons">
            <a href="/login.html" class="btn btn-primary">Войти</a>
            <a href="/register.html" class="btn btn-secondary">Регистрация</a>
        </div>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-text">Шифрование</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Мгновенно</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📱</div>
                <div class="feature-text">Все платформы</div>
            </div>
        </div>
    </div>
</body>
</html>
