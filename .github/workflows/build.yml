# .github/workflows/build.yml
name: Build Messenger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Create gradlew
        run: |
          cd android
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradlew -o gradlew
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradlew.bat -o gradlew.bat
          chmod +x gradlew
          
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-android
          path: android/app/build/outputs/apk/release/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install vcpkg dependencies
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install nlohmann-json cpprestsdk
          .\vcpkg\vcpkg install websocketpp --head
          
      - name: Configure CMake
        run: |
          cd windows
          mkdir build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=..\..\vcpkg\scripts\buildsystems\vcpkg.cmake
          
      - name: Build EXE
        run: |
          cd windows/build
          cmake --build . --config Release
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: messenger-windows
          path: windows/build/Release/*.exe