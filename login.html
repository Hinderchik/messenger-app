<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход - c.c Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { font-size: 48px; text-align: center; margin-bottom: 20px; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .error { color: #ef4444; text-align: center; margin-top: 16px; font-size: 14px; }
        .success { color: #4ade80; text-align: center; margin-top: 16px; font-size: 14px; }
        .link { text-align: center; margin-top: 20px; color: #666; }
        .link a { color: #667eea; text-decoration: none; }
        .forgot-link { text-align: center; margin-top: 12px; }
        .forgot-link a { color: #999; font-size: 14px; text-decoration: none; }
        .verify-link {
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background: #fff5f5;
            border-radius: 12px;
            display: none;
        }
        .verify-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .resend-link {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
        }
        .resend-link a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="logo">💬</div>
        <h2>Вход в c.c Messenger</h2>
        <form id="loginForm">
            <input type="text" id="login" placeholder="Имя пользователя" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <div id="message" class="error"></div>
        <div class="verify-link" id="verifyLink">
            🔐 <a href="#" id="verifyNowBtn">Подтвердить email сейчас</a>
        </div>
        <div class="resend-link" id="resendLink" style="display: none;">
            <a id="resendBtn">📧 Отправить письмо повторно</a>
        </div>
        <div class="forgot-link"><a href="/request-verification.html">📧 Не приходит письмо?</a></div><div class="forgot-link">
            <a href="#" id="forgotBtn">Забыли пароль?</a>
        </div>
        <div class="link">
            Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
        </div>
    </div>

    <script>
        let currentLogin = '';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            currentLogin = login;
            
            const msgDiv = document.getElementById('message');
            const verifyLink = document.getElementById('verifyLink');
            const resendLink = document.getElementById('resendLink');
            
            msgDiv.innerHTML = '⏳ Проверка...';
            verifyLink.style.display = 'none';
            resendLink.style.display = 'none';
            
            try {
                const res = await fetch('/api/auth?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password })
                });
                const data = await res.json();
                
                if (!res.ok) {
                    if (data.needsVerification) {
                        msgDiv.innerHTML = '❌ ' + data.error;
                        verifyLink.style.display = 'block';
                        resendLink.style.display = 'block';
                    } else {
                        throw new Error(data.error);
                    }
                    return;
                }
                
                localStorage.setItem('userId', data.id);
                localStorage.setItem('username', data.username);
                localStorage.setItem('emailVerified', data.emailVerified || false);
                window.location.href = '/chat.html';
            } catch (error) {
                msgDiv.innerHTML = '❌ ' + error.message;
            }
        });
        
        document.getElementById('verifyNowBtn').onclick = (e) => {
            e.preventDefault();
            window.location.href = `/verify-email.html?login=${encodeURIComponent(currentLogin)}`;
        };
        
        document.getElementById('resendBtn').onclick = async () => {
            const btn = document.getElementById('resendBtn');
            btn.textContent = 'Отправка...';
            
            try {
                const res = await fetch('/api/resend-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: currentLogin })
                });
                const data = await res.json();
                document.getElementById('message').innerHTML = '✅ ' + (data.message || 'Письмо отправлено');
                document.getElementById('message').className = 'success';
            } catch(e) {
                document.getElementById('message').innerHTML = '❌ Ошибка отправки';
            } finally {
                btn.textContent = '📧 Отправить письмо повторно';
            }
        };
        
        document.getElementById('forgotBtn').onclick = (e) => {
            e.preventDefault();
            const login = document.getElementById('login').value;
            if (login) {
                window.location.href = `/reset-password.html?login=${encodeURIComponent(login)}`;
            } else {
                alert('Введите имя пользователя');
            }
        };
    </script>
</body>
</html>
