name: Build Messenger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-android
          path: android/app/build/outputs/apk/release/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.bat
          ./vcpkg integrate install
          
      - name: Install dependencies
        run: |
          cd vcpkg
          ./vcpkg install websocketpp nlohmann-json cpprestsdk --triplet x64-windows
          
      - name: Configure CMake
        run: |
          cd windows
          mkdir build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=..\..\vcpkg\scripts\buildsystems\vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows
          
      - name: Build EXE
        run: |
          cd windows/build
          cmake --build . --config Release
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: messenger-windows
          path: windows/build/Release/*.exe