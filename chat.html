<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>c.c Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #17212b;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        /* Основной контейнер */
        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }
        
        /* Сайдбар (всегда виден) */
        .sidebar {
            width: 320px;
            background: #1f2a36;
            height: 100%;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c3e50;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
        }
        
        .user-details h3 { font-size: 17px; margin-bottom: 2px; }
        .user-status { font-size: 13px; color: #8e9eae; }
        
        .icon-btn {
            background: none;
            border: none;
            color: #8e9eae;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }
        
        .search-box { padding: 12px 16px; border-bottom: 1px solid #2c3e50; }
        .search-input {
            width: 100%;
            padding: 10px 16px;
            background: #17212b;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 16px;
        }
        
        .tabs {
            display: flex;
            padding: 8px 16px;
            gap: 8px;
            border-bottom: 1px solid #2c3e50;
        }
        
        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: none;
            border: none;
            color: #8e9eae;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .tab.active { color: #3b82f6; background: rgba(59,130,246,0.1); }
        
        .chats-list, .contacts-list { flex: 1; overflow-y: auto; }
        
        .chat-item, .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid #2c3e50;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-item:active, .contact-item:active { background: rgba(59,130,246,0.1); }
        
        .chat-avatar, .contact-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            position: relative;
            flex-shrink: 0;
        }
        
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            border: 2px solid #1f2a36;
        }
        
        .chat-info, .contact-info { flex: 1; min-width: 0; }
        .chat-name, .contact-name { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
        .chat-message, .contact-status { font-size: 13px; color: #8e9eae; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Экран чата (выезжает поверх на мобилках) */
        .chat-screen {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            background: #17212b;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 200;
        }
        
        .chat-screen.open { transform: translateX(0); }
        
        .chat-header {
            padding: 12px 16px;
            background: #1f2a36;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2c3e50;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-title { flex: 1; }
        .chat-title h3 { font-size: 17px; margin-bottom: 2px; }
        .chat-title span { font-size: 12px; color: #8e9eae; }
        
        .call-btn, .info-btn {
            background: none;
            border: none;
            color: #8e9eae;
            font-size: 22px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }
        
        .message.sent { align-self: flex-end; }
        .message.received { align-self: flex-start; }
        
        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
        }
        
        .sent .bubble { background: #3b82f6; border-bottom-right-radius: 4px; }
        .received .bubble { background: #1f2a36; border-bottom-left-radius: 4px; }
        .time { font-size: 10px; color: #8e9eae; margin-top: 4px; margin-left: 8px; }
        
        .input-area {
            padding: 12px 16px;
            background: #1f2a36;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #17212b;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        .send-btn {
            background: #3b82f6;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .empty-chat { text-align: center; color: #8e9eae; margin-top: 100px; }
        
        /* Ограничения для неверифицированных */
        .restricted-badge {
            display: inline-block;
            background: #f59e0b;
            color: #1a1a2e;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }
        
        .restricted-message {
            background: #2d2d2d;
            padding: 12px;
            border-radius: 12px;
            margin: 8px 16px;
            text-align: center;
            font-size: 13px;
            color: #f59e0b;
        }
        
        /* Десктоп */
        @media (min-width: 769px) {
            .chat-screen {
                position: relative;
                transform: translateX(0) !important;
                width: auto;
                flex: 1;
            }
            .back-btn { display: none; }
        }
        
        /* Мобилки */
        @media (max-width: 768px) {
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info" id="openSettings">
                    <div class="avatar" id="userAvatar"></div>
                    <div class="user-details">
                        <h3 id="username"></h3>
                        <span class="user-status" id="userStatusSpan">В сети</span>
                    </div>
                </div>
                <button class="icon-btn" id="logoutBtn">🚪</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Поиск...">
            </div>
            <div class="tabs">
                <button class="tab active" data-tab="chats">Чаты</button>
                <button class="tab" data-tab="contacts">Контакты</button>
            </div>
            <div id="restrictedWarning" class="restricted-message" style="display: none;">
                ⚠️ Подтвердите email для создания чатов и каналов
            </div>
            <div class="chats-list" id="chatsList"></div>
            <div class="contacts-list" id="contactsList" style="display: none;"></div>
        </div>
        
        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <button class="back-btn" id="backBtn">←</button>
                <div class="chat-title">
                    <h3 id="chatName"></h3>
                    <span id="chatStatus"></span>
                </div>
                <button class="call-btn" id="callBtn">📞</button>
                <button class="info-btn" id="infoBtn">ℹ️</button>
            </div>
            <div class="messages" id="messages">
                <div class="empty-chat">Выберите чат</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" class="message-input" placeholder="Сообщение...">
                <button class="send-btn" id="sendBtn">📤</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';
        let currentUserId = localStorage.getItem('userId');
        let currentUsername = localStorage.getItem('username');
        let currentUserEmail = localStorage.getItem('email');
        let currentUserVerified = localStorage.getItem('emailVerified') === 'true';
        let currentChatId = null;
        
        if (!currentUserId) window.location.href = '/login.html';
        
        // Отображение ограничений
        function updateRestrictedUI() {
            const warning = document.getElementById('restrictedWarning');
            const statusSpan = document.getElementById('userStatusSpan');
            
            if (!currentUserVerified) {
                if (warning) warning.style.display = 'block';
                if (statusSpan) statusSpan.innerHTML = '⚠️ Требуется верификация';
            } else {
                if (warning) warning.style.display = 'none';
                if (statusSpan) statusSpan.innerHTML = 'В сети ✓';
            }
        }
        
        // Проверка прав на создание чата
        function canCreateChat() {
            if (!currentUserVerified) {
                alert('Для создания чата необходимо подтвердить email. Перейдите в настройки.');
                return false;
            }
            return true;
        }
        
        document.getElementById('username').innerText = currentUsername || 'User';
        document.getElementById('userAvatar').innerText = (currentUsername || 'U')[0].toUpperCase();
        updateRestrictedUI();
        
        document.getElementById('openSettings').onclick = () => { window.location.href = '/settings.html'; };
        document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = '/login.html'; };
        
        function openChat(chatId, name) {
            currentChatId = chatId;
            document.getElementById('chatName').innerText = name;
            document.getElementById('chatScreen').classList.add('open');
            loadMessages();
        }
        
        document.getElementById('backBtn').onclick = () => {
            document.getElementById('chatScreen').classList.remove('open');
            currentChatId = null;
        };
        
        document.getElementById('callBtn').onclick = () => { alert('Звонок в разработке'); };
        document.getElementById('infoBtn').onclick = () => { alert('Информация о чате'); };
        
        async function loadChats() {
            try {
                const res = await fetch(`${API_URL}/api/chats?userId=${currentUserId}`);
                const chats = await res.json();
                const container = document.getElementById('chatsList');
                if (container) {
                    if (chats.length === 0) {
                        container.innerHTML = '<div style="padding: 20px; text-align: center; color: #8e9eae;">Нет чатов</div>';
                    } else {
                        container.innerHTML = chats.map(chat => {
                            let name = chat.name;
                            if (chat.type === 'private' && chat.members) {
                                const other = chat.members.find(m => m.id !== currentUserId);
                                name = other ? other.username : 'Чат';
                            }
                            return `<div class="chat-item" onclick="openChat('${chat.id}', '${name}')">
                                <div class="chat-avatar">${(name || 'C')[0].toUpperCase()}</div>
                                <div class="chat-info">
                                    <div class="chat-name">${escapeHtml(name)}</div>
                                    <div class="chat-message">${escapeHtml(chat.last_message || 'Нет сообщений')}</div>
                                </div>
                            </div>`;
                        }).join('');
                    }
                }
            } catch(e) { console.error(e); }
        }
        
        async function loadContacts() {
            try {
                const res = await fetch(`${API_URL}/api/users?userId=${currentUserId}`);
                const users = await res.json();
                const container = document.getElementById('contactsList');
                if (container) {
                    if (users.length === 0) {
                        container.innerHTML = '<div style="padding: 20px; text-align: center; color: #8e9eae;">Нет других пользователей</div>';
                    } else {
                        container.innerHTML = users.map(user => `<div class="contact-item" onclick="startChat('${user.id}', '${user.username}')">
                            <div class="contact-avatar">
                                ${user.username[0].toUpperCase()}
                                <div class="online-dot" style="background: ${user.online ? '#4ade80' : '#6b7280'}"></div>
                            </div>
                            <div class="contact-info">
                                <div class="contact-name">${escapeHtml(user.username)}</div>
                                <div class="contact-status">${user.online ? 'В сети' : 'Был недавно'}</div>
                            </div>
                        </div>`).join('');
                    }
                }
            } catch(e) { console.error(e); }
        }
        
        async function startChat(userId, userName) {
            if (!canCreateChat()) return;
            
            try {
                const res = await fetch(`${API_URL}/api/create-chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user1Id: currentUserId, user2Id: userId })
                });
                const data = await res.json();
                if (data.chatId) openChat(data.chatId, userName);
                loadChats();
            } catch(e) { console.error(e); }
        }
        
        async function loadMessages() {
            if (!currentChatId) return;
            try {
                const res = await fetch(`${API_URL}/api/messages?chatId=${currentChatId}&limit=50`);
                const messages = await res.json();
                const container = document.getElementById('messages');
                if (container) {
                    if (messages.length === 0) {
                        container.innerHTML = '<div class="empty-chat">Нет сообщений</div>';
                    } else {
                        container.innerHTML = messages.map(msg => `<div class="message ${msg.from_id === currentUserId ? 'sent' : 'received'}">
                            <div class="bubble">${escapeHtml(msg.text || '[Файл]')}</div>
                            <div class="time">${formatTime(msg.created_at)}</div>
                        </div>`).join('');
                        container.scrollTop = container.scrollHeight;
                    }
                }
            } catch(e) { console.error(e); }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatId) return;
            
            try {
                const res = await fetch(`${API_URL}/api/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId: currentChatId, fromId: currentUserId, text })
                });
                if (res.ok) {
                    input.value = '';
                    await loadMessages();
                    loadChats();
                }
            } catch(e) { console.error(e); }
        }
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function formatTime(t) { if (!t) return ''; return new Date(t).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
        
        function setupTabs() {
            const tabs = document.querySelectorAll('.tab');
            const chatsList = document.getElementById('chatsList');
            const contactsList = document.getElementById('contactsList');
            tabs.forEach(tab => {
                tab.onclick = () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    if (tab.dataset.tab === 'chats') {
                        chatsList.style.display = 'block';
                        contactsList.style.display = 'none';
                        loadChats();
                    } else {
                        chatsList.style.display = 'none';
                        contactsList.style.display = 'block';
                        loadContacts();
                    }
                };
            });
        }
        
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        
        setupTabs();
        loadChats();
        setInterval(() => { if (currentChatId) loadMessages(); loadChats(); }, 3000);
    </script>
</body>
</html>
