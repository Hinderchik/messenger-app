name: Build Messenger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Create gradle wrapper
        run: |
          cd android
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "#!/bin/sh" > gradlew
          echo "exec java -cp \"gradle/wrapper/gradle-wrapper.jar\" org.gradle.wrapper.GradleWrapperMain \"\$@\"" >> gradlew
          chmod +x gradlew
          
      - name: Create minimal icons
        run: |
          cd android/app/src/main/res
          mkdir -p mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi
          echo "0" > mipmap-hdpi/ic_launcher.png
          echo "0" > mipmap-mdpi/ic_launcher.png
          echo "0" > mipmap-xhdpi/ic_launcher.png
          echo "0" > mipmap-xxhdpi/ic_launcher.png
          echo "0" > mipmap-xxxhdpi/ic_launcher.png
          echo "0" > mipmap-hdpi/ic_launcher_round.png
          echo "0" > mipmap-mdpi/ic_launcher_round.png
          echo "0" > mipmap-xhdpi/ic_launcher_round.png
          echo "0" > mipmap-xxhdpi/ic_launcher_round.png
          echo "0" > mipmap-xxxhdpi/ic_launcher_round.png
          
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-android
          path: android/app/build/outputs/apk/release/*.apk