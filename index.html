<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c.c Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 450px;
        }
        .logo { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 32px; color: #1a1a2e; margin-bottom: 12px; }
        p { color: #666; margin-bottom: 32px; }
        .buttons { display: flex; gap: 16px; justify-content: center; }
        .btn {
            padding: 12px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💬</div>
        <h1>c.c Messenger</h1>
        <p>Быстрый и безопасный мессенджер</p>
        <div class="buttons">
            <a href="/login.html" class="btn btn-primary">Войти</a>
            <a href="/register.html" class="btn btn-secondary">Регистрация</a>
        </div>
    </div>
</body>
</html>
