<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Регистрация - c.c Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { font-size: 48px; text-align: center; margin-bottom: 20px; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .error { color: #ef4444; text-align: center; margin-top: 16px; font-size: 14px; }
        .success { color: #4ade80; text-align: center; margin-top: 16px; font-size: 14px; }
        .link { text-align: center; margin-top: 20px; color: #666; }
        .link a { color: #667eea; text-decoration: none; }
        #codeSection { text-align: center; } #verifyCode { width: 100%; padding: 14px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 24px; text-align: center; letter-spacing: 4px; } .optional-badge { font-size: 11px; color: #888; margin-top: -12px; margin-bottom: 16px; text-align: right; }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="logo">💬</div>
        <h2>Регистрация</h2>
        <form id="registerForm">
            <input type="text" id="username" placeholder="Имя пользователя" required>
            <input type="email" id="email" placeholder="Email (необязательно)">
            <div class="optional-badge">можно пропустить</div>
            <input type="password" id="password" placeholder="Пароль (8-16 символов)" required>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <div id="errorMsg" class="error"></div>
        <div class="link">
            Уже есть аккаунт? <a href="/login.html">Войти</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value || null;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('errorMsg');
            msgDiv.innerHTML = '⏳ Регистрация...';
            
            try {
                const res = await fetch('/api/auth?action=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                
                msgDiv.innerHTML = '✅ Регистрация успешна! Теперь войдите.';
                msgDiv.className = 'success';
                setTimeout(() => window.location.href = '/login.html', 1500);
            } catch (error) {
                msgDiv.innerHTML = '❌ ' + error.message;
                msgDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
    <script>
        let verificationCode = null;
        let userEmail = null;
        
        // После успешной регистрации показываем поле для кода
        async function showCodeInput(email) {
            userEmail = email;
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('codeSection').style.display = 'block';
            
            // Отправляем код на почту
            await fetch('/api/send-verification-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
        }
        
        // Обработчик регистрации
        const originalSubmit = document.getElementById('registerForm').onsubmit;
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const msgDiv = document.getElementById('errorMsg');
            msgDiv.innerHTML = '⏳ Регистрация...';
            
            try {
                const res = await fetch('/api/auth?action=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email: email || null, password })
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);
                
                if (email) {
                    // Показываем поле для ввода кода
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('codeSection').style.display = 'block';
                    document.getElementById('codeEmail').innerText = email;
                    
                    // Отправляем код
                    await fetch('/api/send-verification-code', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    msgDiv.innerHTML = '✅ Код отправлен на почту!';
                    msgDiv.className = 'success';
                } else {
                    msgDiv.innerHTML = '✅ Регистрация успешна! Теперь войдите.';
                    msgDiv.className = 'success';
                    setTimeout(() => window.location.href = '/login.html', 1500);
                }
            } catch (error) {
                msgDiv.innerHTML = '❌ ' + error.message;
                msgDiv.className = 'error';
            }
        });
        
        // Подтверждение кода
        window.verifyCode = async function() {
            const code = document.getElementById('verifyCode').value;
            const msgDiv = document.getElementById('codeMessage');
            
            if (!code || code.length !== 6) {
                msgDiv.innerHTML = '❌ Введите 6-значный код';
                return;
            }
            
            msgDiv.innerHTML = '⏳ Проверка...';
            
            try {
                const res = await fetch('/api/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, email: userEmail })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msgDiv.innerHTML = '✅ Email подтверждён! Перенаправление...';
                    msgDiv.className = 'success';
                    setTimeout(() => window.location.href = '/login.html', 1500);
                } else {
                    msgDiv.innerHTML = '❌ ' + data.error;
                    msgDiv.className = 'error';
                }
            } catch (error) {
                msgDiv.innerHTML = '❌ Ошибка соединения';
                msgDiv.className = 'error';
            }
        };
    </script>
    
    <div id="codeSection" style="display: none;">
        <div class="logo">🔐</div>
        <h2>Подтверждение email</h2>
        <p>Код отправлен на <strong id="codeEmail"></strong></p>
        <input type="text" id="verifyCode" placeholder="6-значный код" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 4px;">
        <button onclick="verifyCode()">Подтвердить</button>
        <div id="codeMessage" class="error" style="margin-top: 16px;"></div>
        <div class="link" style="margin-top: 16px;">
            <a href="#" onclick="fetch('/api/send-verification-code', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: userEmail})}); alert('Код отправлен повторно');">Отправить код повторно</a>
        </div>
    </div>
