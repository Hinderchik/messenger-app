<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Настройки - c.c Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #17212b;
            color: #ffffff;
            min-height: 100vh;
        }
        .settings-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .settings-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2c3e50;
        }
        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            width: 44px;
            height: 44px;
        }
        .settings-header h1 {
            font-size: 24px;
        }
        .settings-section {
            background: #1f2a36;
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .settings-section h3 {
            padding: 16px 20px;
            background: #1f2a36;
            color: #8e9eae;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 1px solid #2c3e50;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #2c3e50;
            cursor: pointer;
            transition: background 0.2s;
        }
        .setting-item:last-child {
            border-bottom: none;
        }
        .setting-item:hover {
            background: #2a3540;
        }
        .setting-label {
            font-size: 16px;
        }
        .setting-value {
            color: #8e9eae;
            font-size: 14px;
        }
        .setting-arrow {
            color: #8e9eae;
            margin-left: 8px;
        }
        .email-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .email-verified {
            background: #4ade80;
            color: #1a1a2e;
        }
        .email-unverified {
            background: #f59e0b;
            color: #1a1a2e;
        }
        .verify-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .verify-btn:hover {
            background: #2563eb;
        }
        .theme-switch {
            width: 50px;
            height: 26px;
            background: #17212b;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .theme-switch.active {
            background: #3b82f6;
        }
        .theme-switch::after {
            content: '';
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        .theme-switch.active::after {
            transform: translateX(24px);
        }
        .logout-btn {
            width: 100%;
            padding: 16px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .info-text {
            font-size: 12px;
            color: #8e9eae;
            text-align: center;
            margin-top: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1f2a36;
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        .modal-content h3 {
            margin-bottom: 16px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            background: #17212b;
            border: 1px solid #2c3e50;
            border-radius: 10px;
            color: white;
            margin: 16px 0;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-buttons button {
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .modal-buttons button:first-child {
            background: none;
            border: 1px solid #2c3e50;
            color: white;
        }
        .modal-buttons button:last-child {
            background: #3b82f6;
            border: none;
            color: white;
        }
        @media (max-width: 768px) {
            .settings-container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1>Настройки</h1>
        </div>
        
        <div class="settings-section">
            <h3>Аккаунт</h3>
            <div class="setting-item" id="emailItem">
                <span class="setting-label">Email</span>
                <span class="setting-value" id="emailDisplay"></span>
            </div>
            <div class="setting-item" id="verifyItem" style="display: none;">
                <span class="setting-label">Подтверждение email</span>
                <span class="setting-value">
                    <span id="emailStatus" class="email-status email-unverified">Не подтверждён</span>
                </span>
            </div>
            <div class="setting-item" id="resendItem" style="display: none;">
                <span class="setting-label"></span>
                <button id="resendBtn" class="verify-btn">Отправить письмо повторно</button>
            </div>
            <div class="setting-item">
                <span class="setting-label">ID пользователя</span>
                <span class="setting-value" id="userIdDisplay"></span>
            </div>
        </div>
        
        <div class="settings-section">
            <h3>Внешний вид</h3>
            <div class="setting-item">
                <span class="setting-label">Тёмная тема</span>
                <div class="theme-switch" id="themeSwitch"></div>
            </div>
        </div>
        
        <div class="settings-section">
            <h3>О приложении</h3>
            <div class="setting-item">
                <span class="setting-label">Версия</span>
                <span class="setting-value">1.0.0</span>
            </div>
        </div>
        
        <button class="logout-btn" id="logoutBtn">Выйти из аккаунта</button>
        <div class="info-text">c.c Messenger — безопасный мессенджер</div>
    </div>
    
    <!-- Модальное окно для добавления email -->
    <div class="modal" id="emailModal">
        <div class="modal-content">
            <h3>Добавить email</h3>
            <p>Введите email для подтверждения аккаунта</p>
            <input type="email" id="modalEmail" placeholder="example@mail.com">
            <div class="modal-buttons">
                <button id="cancelModal">Отмена</button>
                <button id="confirmModal">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';
        const userId = localStorage.getItem('userId');
        const username = localStorage.getItem('username');
        let userEmail = localStorage.getItem('email');
        let userEmailVerified = localStorage.getItem('emailVerified') === 'true';
        
        // Отображение данных
        document.getElementById('userIdDisplay').textContent = userId ? userId.slice(0,8)+'...' : '—';
        document.getElementById('emailDisplay').textContent = userEmail || 'Не указан';
        
        // Статус email
        function updateEmailUI() {
            const verifyItem = document.getElementById('verifyItem');
            const resendItem = document.getElementById('resendItem');
            const emailStatus = document.getElementById('emailStatus');
            
            if (userEmail) {
                if (userEmailVerified) {
                    emailStatus.textContent = 'Подтверждён ✓';
                    emailStatus.className = 'email-status email-verified';
                    if (resendItem) resendItem.style.display = 'none';
                } else {
                    emailStatus.textContent = 'Не подтверждён';
                    emailStatus.className = 'email-status email-unverified';
                    if (resendItem) resendItem.style.display = 'flex';
                }
                if (verifyItem) verifyItem.style.display = 'flex';
            } else {
                if (verifyItem) verifyItem.style.display = 'none';
                if (resendItem) resendItem.style.display = 'none';
            }
        }
        
        // Проверка статуса с сервера
        async function fetchUserStatus() {
            try {
                const res = await fetch(`${API_URL}/api/user-status?userId=${userId}`);
                const data = await res.json();
                if (data.email !== userEmail) {
                    userEmail = data.email;
                    userEmailVerified = data.email_verified;
                    localStorage.setItem('email', userEmail || '');
                    localStorage.setItem('emailVerified', userEmailVerified);
                    document.getElementById('emailDisplay').textContent = userEmail || 'Не указан';
                    updateEmailUI();
                }
            } catch(e) { console.error(e); }
        }
        
        // Добавление/изменение email
        document.getElementById('emailItem').onclick = () => {
            document.getElementById('emailModal').classList.add('active');
            document.getElementById('modalEmail').value = userEmail || '';
        };
        
        document.getElementById('cancelModal').onclick = () => {
            document.getElementById('emailModal').classList.remove('active');
        };
        
        document.getElementById('confirmModal').onclick = async () => {
            const newEmail = document.getElementById('modalEmail').value.trim();
            if (!newEmail || !newEmail.includes('@')) {
                alert('Введите корректный email');
                return;
            }
            
            const res = await fetch(`${API_URL}/api/add-email`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, email: newEmail })
            });
            const data = await res.json();
            
            if (res.ok) {
                alert('Письмо отправлено! Проверьте почту для подтверждения.');
                document.getElementById('emailModal').classList.remove('active');
                await fetchUserStatus();
            } else {
                alert(data.error || 'Ошибка');
            }
        };
        
        // Повторная отправка письма
        document.getElementById('resendBtn').onclick = async () => {
            const res = await fetch(`${API_URL}/api/resend-verification`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login: userId })
            });
            const data = await res.json();
            alert(data.message || 'Письмо отправлено');
        };
        
        // Тёмная тема
        const themeSwitch = document.getElementById('themeSwitch');
        const body = document.body;
        const savedTheme = localStorage.getItem('theme') || 'dark';
        body.classList.add(savedTheme);
        if (savedTheme === 'dark') themeSwitch.classList.add('active');
        
        themeSwitch.addEventListener('click', () => {
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                body.classList.add('light');
                localStorage.setItem('theme', 'light');
                themeSwitch.classList.remove('active');
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeSwitch.classList.add('active');
            }
        });
        
        // Выход
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.clear();
            window.location.href = '/login.html';
        };
        
        fetchUserStatus();
        updateEmailUI();
    </script>
</body>
</html>
