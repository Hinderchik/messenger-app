<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Сброс пароля - c.c Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { font-size: 48px; text-align: center; margin-bottom: 20px; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .error { color: #ef4444; text-align: center; margin-top: 16px; font-size: 14px; }
        .success { color: #4ade80; text-align: center; margin-top: 16px; font-size: 14px; }
        .link { text-align: center; margin-top: 20px; color: #666; }
        .link a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-card" id="content">
        <div class="logo">🔐</div>
        <h2>Сброс пароля</h2>
        <form id="resetForm">
            <input type="password" id="password" placeholder="Новый пароль (8-16 символов)" required>
            <input type="password" id="confirm" placeholder="Подтвердите пароль" required>
            <button type="submit">Сбросить пароль</button>
        </form>
        <div id="message" class="error"></div>
        <div class="link">
            <a href="/login.html">Вернуться ко входу</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        
        if (!token) {
            document.getElementById('content').innerHTML = `
                <div class="logo">❌</div>
                <h2>Неверная ссылка</h2>
                <p>Токен сброса отсутствует</p>
                <div class="link"><a href="/login.html">Вернуться ко входу</a></div>
            `;
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            
            const msgDiv = document.getElementById('message');
            
            if (password !== confirm) {
                msgDiv.innerHTML = '❌ Пароли не совпадают';
                return;
            }
            
            if (password.length < 8 || password.length > 16) {
                msgDiv.innerHTML = '❌ Пароль должен быть 8-16 символов';
                return;
            }
            
            msgDiv.innerHTML = '⏳ Сохранение...';
            
            try {
                const res = await fetch('/api/reset-password-confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msgDiv.innerHTML = '✅ ' + data.message;
                    msgDiv.className = 'success';
                    setTimeout(() => window.location.href = '/login.html', 2000);
                } else {
                    msgDiv.innerHTML = '❌ ' + data.error;
                }
            } catch (error) {
                msgDiv.innerHTML = '❌ Ошибка соединения';
            }
        });
    </script>
</body>
</html>
